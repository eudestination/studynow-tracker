<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TheoFIFA 2026 World Cup Scores</title>
<meta name="description" content="Live FIFA World Cup 2026 scores, standings, stats, teams, players, stadiums and referees">
<meta name="theme-color" content="#0d1117">
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────── */
:root{
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --bg4:     #30363d;
  --border:  #30363d;
  --text:    #e6edf3;
  --t2:      #8b949e;
  --t3:      #6e7681;
  --blue:    #1f6feb;
  --blue2:   #388bfd;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
  --gold:    #f0c040;
  --live:    #f85149;
  --r:       8px;
  --r2:      12px;
}

/* ── RESET ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;min-height:100vh;padding-bottom:64px}
button{cursor:pointer;font-family:inherit}
a{text-decoration:none;color:inherit}

/* ── HEADER ────────────────────────────────────────────── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.hdr-top{display:flex;align-items:center;gap:10px;padding:10px 14px;max-width:1400px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1f6feb,#388bfd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:11.5px;font-weight:700;line-height:1.25}
.logo-text em{color:var(--blue2);font-style:normal}
.srch{flex:1;max-width:380px;position:relative}
.srch input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:7px 12px 7px 34px;color:var(--text);font-size:13px;outline:none;transition:border-color .18s}
.srch input:focus{border-color:var(--blue)}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.live-dot{background:var(--live);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

/* ── TOP NAV ───────────────────────────────────────────── */
.topnav{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.topnav::-webkit-scrollbar{display:none}
.topnav-inner{display:flex;padding:0 14px;max-width:1400px;margin:0 auto}
.tnb{background:none;border:none;color:var(--t2);font-size:13px;font-weight:500;padding:10px 12px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s;display:flex;align-items:center;gap:5px}
.tnb:hover{color:var(--text)}
.tnb.on{color:var(--text);border-bottom-color:var(--blue2)}

/* ── MOBILE BOTTOM NAV ─────────────────────────────────── */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:90}
@media(max-width:768px){
  .mobnav{display:flex}
  body{padding-bottom:62px}
}
.mbn{flex:1;background:none;border:none;color:var(--t3);font-size:9.5px;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .18s}
.mbn.on{color:var(--blue2)}
.mbn-ico{font-size:19px;line-height:1}

/* ── TABS (inside pages) ───────────────────────────────── */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--bg3);border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;color:var(--t2);font-size:12.5px;font-weight:500;padding:10px 14px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--blue2)}

/* ── LAYOUT ────────────────────────────────────────────── */
.wrap{max-width:1400px;margin:0 auto}

/* ── PAGES ─────────────────────────────────────────────── */
.pg{display:none}.pg.on{display:block}

/* ── CARDS / SECTIONS ──────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.sec-name{font-size:12.5px;font-weight:600}
.sec-sub{font-size:11px;color:var(--t2);margin-left:auto}

/* ── MATCH CARD ────────────────────────────────────────── */
.mc{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.mc:hover{background:var(--bg3)}
.mc:last-child{border-bottom:none}
.mc-time{font-size:11px;color:var(--t2);width:38px;text-align:center;flex-shrink:0;line-height:1.35}
.mc-time.live{color:var(--live);font-weight:700}
.mc-time.ft{color:var(--t3)}
.mc-teams{flex:1;min-width:0}
.mc-row{display:flex;align-items:center;gap:7px;padding:1.5px 0}
.mc-flag{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.mc-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-score{font-size:15px;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.mc-score.w{color:var(--text)}
.mc-score.l{color:var(--t3)}
.mc-meta{font-size:10px;color:var(--t3);text-align:right;flex-shrink:0;line-height:1.5}

/* ── FILTER PILLS ──────────────────────────────────────── */
.pills{display:flex;gap:5px;padding:9px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.pills::-webkit-scrollbar{display:none}
.pill{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:5px 11px;font-size:12px;color:var(--t2);white-space:nowrap;transition:all .18s}
.pill.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pill:hover:not(.on){border-color:var(--blue2);color:var(--text)}

/* ── TEAM GRID ─────────────────────────────────────────── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;padding:10px}
.team-tile{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s}
.team-tile:hover{border-color:var(--blue);transform:translateY(-1px)}
.t-flag{font-size:34px;margin-bottom:7px}
.t-name{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.3}
.t-group{font-size:10.5px;color:var(--t2)}
.cbadge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;display:inline-block;margin-top:4px}
.UEFA{background:#1a3d70;color:#64b5f6}
.CONMEBOL{background:#1a4d25;color:#66bb6a}
.CONCACAF{background:#4d3700;color:#ffb300}
.CAF{background:#4d1a00;color:#ff7043}
.AFC{background:#3d0050;color:#ce93d8}
.OFC{background:#004d40;color:#4db6ac}

/* ── STANDINGS TABLE ───────────────────────────────────── */
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:10px;color:var(--t3);font-weight:500;padding:7px 5px;text-align:center;border-bottom:1px solid var(--border)}
.stbl th:nth-child(2){text-align:left;padding-left:8px}
.stbl td{padding:8px 5px;text-align:center;font-size:12px;border-bottom:1px solid var(--border)}
.stbl td:nth-child(2){text-align:left}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--bg3)}
.t-cell{display:flex;align-items:center;gap:6px}
.qdot{width:3px;border-radius:2px;height:28px;flex-shrink:0}
.pts{font-weight:700}
.gd-pos{color:var(--green)}
.gd-neg{color:var(--red)}

/* ── GROUP TABS ────────────────────────────────────────── */
.gtabs{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.gtab{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:11.5px;font-weight:600;transition:all .18s}
.gtab.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── PLAYER ROW ────────────────────────────────────────── */
.prow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.prow:hover{background:var(--bg3)}
.p-rank{font-size:13px;font-weight:700;color:var(--t3);width:22px;text-align:center;flex-shrink:0}
.p-rank.top{color:var(--gold)}
.p-avatar{width:34px;height:34px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-detail{font-size:10.5px;color:var(--t2)}
.rating{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex-shrink:0}
.r9{background:#143214;color:#4caf50}
.r85{background:#13273d;color:#64b5f6}
.r8{background:#3d3314;color:#ffd54f}
.r7{background:#3d1414;color:#ef5350}

/* ── STAT ROW ──────────────────────────────────────────── */
.srow{padding:11px 14px;border-bottom:1px solid var(--border)}
.srow-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.sbar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2));border-radius:2px;transition:width .9s .1s}
.sval{font-size:18px;font-weight:700;color:var(--blue2);min-width:36px;text-align:right}
.sval-lbl{font-size:10px;color:var(--t3);text-align:right}

/* ── STADIUM GRID ──────────────────────────────────────── */
.stad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:10px}
.stad-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .18s}
.stad-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.stad-img{height:110px;background:linear-gradient(135deg,#0a1628,#1a2744);display:flex;align-items:center;justify-content:center;font-size:50px}
.stad-body{padding:11px}
.stad-name{font-size:13px;font-weight:700;margin-bottom:3px}
.stad-city{font-size:11.5px;color:var(--t2);margin-bottom:8px}
.stad-stats{display:flex;gap:14px}
.ss{font-size:10.5px;color:var(--t3)}
.ss strong{display:block;font-size:12.5px;color:var(--text)}

/* ── REFEREE ROW ───────────────────────────────────────── */
.ref-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
.ref-ava{width:42px;height:42px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ref-info{flex:1;min-width:0}
.ref-name{font-size:13px;font-weight:600}
.ref-detail{font-size:10.5px;color:var(--t2)}
.ref-finals{font-size:10px;color:var(--gold);margin-top:2px}
.ref-nums{display:flex;gap:14px;flex-shrink:0}
.rn{text-align:center}
.rn-num{font-size:16px;font-weight:700}
.rn-lbl{font-size:9.5px;color:var(--t3)}

/* ── MODAL ─────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;overflow-y:auto;display:flex;justify-content:center;padding:16px}
.modal{background:var(--bg2);border-radius:var(--r2);width:100%;max-width:580px;overflow:hidden;align-self:flex-start}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 11px;font-size:13px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.ig{background:var(--bg2);padding:11px 14px}
.ig-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ig-val{font-size:14px;font-weight:600}

/* ── MATCH DETAIL HEADER ───────────────────────────────── */
.md-hdr{background:linear-gradient(135deg,var(--bg3),var(--bg2));padding:22px 14px;text-align:center}
.md-teams{display:flex;align-items:center;justify-content:center;gap:16px}
.md-team{text-align:center;flex:1;max-width:130px}
.md-flag{font-size:44px;margin-bottom:6px}
.md-tname{font-size:13px;font-weight:700}
.md-score{font-size:44px;font-weight:800;min-width:90px;text-align:center}
.md-status{font-size:11.5px;color:var(--live);font-weight:600}

/* ── WC BANNER ─────────────────────────────────────────── */
.wc-banner{background:linear-gradient(135deg,#0a1628,#1a2744 50%,#0d2040);padding:20px 14px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.wc-banner::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(31,111,235,.12) 0%,transparent 60%),radial-gradient(circle at 80% 50%,rgba(240,192,64,.08) 0%,transparent 60%)}
.wc-trophy{font-size:38px;display:block;margin-bottom:6px;position:relative}
.wc-title{font-size:21px;font-weight:800;position:relative;margin-bottom:3px}
.wc-title span{color:var(--gold)}
.wc-sub{font-size:11.5px;color:var(--t2);position:relative}
.wc-hosts{display:flex;justify-content:center;gap:10px;margin-top:11px;position:relative}
.wc-host{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:4px 11px;font-size:11px;display:flex;align-items:center;gap:5px}

/* ── SUMMARY STATS BAR ─────────────────────────────────── */
.sbar-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
@media(max-width:480px){.sbar-row{grid-template-columns:repeat(2,1fr)}}
.sbar-cell{background:var(--bg2);padding:11px 8px;text-align:center}
.sbar-num{font-size:20px;font-weight:800;color:var(--blue2)}
.sbar-lbl{font-size:10px;color:var(--t3);margin-top:1px}

/* ── EVENT TIMELINE ────────────────────────────────────── */
.ev-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.ev-item:last-child{border-bottom:none}
.ev-min{font-size:11px;font-weight:700;color:var(--blue2);width:28px;flex-shrink:0}
.ev-ico{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.ev-txt{font-size:12.5px}

/* ── MISC ──────────────────────────────────────────────── */
.loading{padding:36px;text-align:center;color:var(--t3)}
.spin{width:28px;height:28px;border:3px solid var(--bg4);border-top-color:var(--blue2);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.scroll-top{position:fixed;bottom:72px;right:16px;background:var(--blue);color:#fff;width:38px;height:38px;border-radius:50%;border:none;font-size:17px;display:none;align-items:center;justify-content:center;z-index:89;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.scroll-top.show{display:flex}
@media(max-width:768px){.scroll-top{bottom:70px}}

/* ── KNOCKOUT BRACKET ──────────────────────────────────── */
.ko-round{margin-bottom:18px;padding:0 12px}
.ko-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.ko-match{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-size:12px}
.ko-team{display:flex;align-items:center;gap:6px;padding:2px 0}
.ko-date{font-size:10px;color:var(--t3);margin-top:5px}

/* ── RESPONSIVE ────────────────────────────────────────── */
@media(max-width:600px){
  .wc-title{font-size:17px}
  .sbar-num{font-size:17px}
  .team-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .stad-grid{grid-template-columns:1fr}
  .hdr-top{padding:8px 10px}
}
</style>
</head>
<body>

<!-- ═══ HEADER ════════════════════════════════════════════ -->
<header class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div class="logo-text">TheoFIFA<br><em>2026 World Cup</em></div>
    </div>
    <div class="srch">
      <span class="srch-ico">🔍</span>
      <input type="text" id="searchInput" placeholder="Search teams, players…" autocomplete="off" oninput="doSearch(this.value)">
    </div>
    <div class="hdr-right">
      <span class="live-dot" id="liveDot">● LIVE</span>
    </div>
  </div>
  <div class="topnav">
    <div class="topnav-inner">
      <button class="tnb on" data-pg="matches"   onclick="nav('matches',this)">⚽ Matches</button>
      <button class="tnb"    data-pg="standings" onclick="nav('standings',this)">📊 Standings</button>
      <button class="tnb"    data-pg="teams"     onclick="nav('teams',this)">🛡️ Teams</button>
      <button class="tnb"    data-pg="players"   onclick="nav('players',this)">👤 Players</button>
      <button class="tnb"    data-pg="stats"     onclick="nav('stats',this)">🏆 Top Stats</button>
      <button class="tnb"    data-pg="stadiums"  onclick="nav('stadiums',this)">🏟️ Stadiums</button>
      <button class="tnb"    data-pg="referees"  onclick="nav('referees',this)">🟨 Referees</button>
    </div>
  </div>
</header>

<!-- ═══ WC BANNER ════════════════════════════════════════ -->
<div class="wc-banner">
  <span class="wc-trophy">🏆</span>
  <div class="wc-title">FIFA World Cup <span>2026™</span></div>
  <div class="wc-sub">June 11 – July 19, 2026 · United States, Canada &amp; Mexico</div>
  <div class="wc-hosts">
    <div class="wc-host">🇺🇸 USA</div>
    <div class="wc-host">🇨🇦 Canada</div>
    <div class="wc-host">🇲🇽 Mexico</div>
  </div>
</div>

<!-- ═══ SUMMARY STATS BAR ═════════════════════════════════ -->
<div class="sbar-row">
  <div class="sbar-cell"><div class="sbar-num" id="s-goals">–</div><div class="sbar-lbl">Total Goals</div></div>
  <div class="sbar-cell"><div class="sbar-num" id="s-played">–</div><div class="sbar-lbl">Matches Played</div></div>
  <div class="sbar-cell"><div class="sbar-num" id="s-live">–</div><div class="sbar-lbl">Live Now</div></div>
  <div class="sbar-cell"><div class="sbar-num">48</div><div class="sbar-lbl">Teams</div></div>
</div>

<!-- ═══ PAGES ═════════════════════════════════════════════ -->
<div class="wrap">

  <!-- MATCHES -->
  <div id="pg-matches" class="pg on">
    <div class="tabs">
      <button class="tab on" onclick="matchTab('live',this)">🔴 Live</button>
      <button class="tab"    onclick="matchTab('today',this)">Today</button>
      <button class="tab"    onclick="matchTab('schedule',this)">Schedule</button>
      <button class="tab"    onclick="matchTab('results',this)">Results</button>
    </div>
    <div id="match-body"></div>
  </div>

  <!-- STANDINGS -->
  <div id="pg-standings" class="pg">
    <div class="tabs">
      <button class="tab on" onclick="standTab('groups',this)">Groups</button>
      <button class="tab"    onclick="standTab('knockout',this)">Knockout</button>
    </div>
    <div id="stand-body"></div>
  </div>

  <!-- TEAMS -->
  <div id="pg-teams" class="pg">
    <div class="pills" id="conf-pills">
      <div class="pill on"  onclick="filterConf('ALL',this)">All (48)</div>
      <div class="pill" onclick="filterConf('UEFA',this)">🇪🇺 UEFA</div>
      <div class="pill" onclick="filterConf('CONMEBOL',this)">🌎 CONMEBOL</div>
      <div class="pill" onclick="filterConf('CONCACAF',this)">🌎 CONCACAF</div>
      <div class="pill" onclick="filterConf('CAF',this)">🌍 CAF</div>
      <div class="pill" onclick="filterConf('AFC',this)">🌏 AFC</div>
      <div class="pill" onclick="filterConf('OFC',this)">🌊 OFC</div>
    </div>
    <div id="teams-body"></div>
  </div>

  <!-- PLAYERS -->
  <div id="pg-players" class="pg">
    <div class="tabs">
      <button class="tab on" onclick="playerTab('best',this)">⭐ Top Rated</button>
      <button class="tab"    onclick="playerTab('gk',this)">🥅 Goalkeepers</button>

const TODAY='2026-06-26';
let activeMatchTab='live';

function matchTab(t,btn){
  activeMatchTab=t;
  document.querySelectorAll('#pg-matches .tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderMatches();
}

function renderMatches(){
  const el=document.getElementById('match-body');
  const t=activeMatchTab;
  let html='';

  if(t==='live'){
    const live=MATCHES.filter(m=>m.live);
    if(!live.length){html='<div class="loading">No live matches right now</div>';}
    else{
      html+='<div class="sec-hdr"><span>🔴</span><span class="sec-name">Live Now</span><span class="sec-sub">'+(live.length)+' match'+(live.length>1?'es':'')+' in progress</span></div>';
      live.forEach(m=>{html+=mcHTML(m,true);});
    }
  }
  else if(t==='today'){
    const todays=MATCHES.filter(m=>m.date===TODAY);
    if(!todays.length){html='<div class="loading">No matches today</div>';}
    else{
      const done=todays.filter(m=>m.st==='FT');
      const live=todays.filter(m=>m.live);
      const up=todays.filter(m=>!m.live&&m.hs===null);
      if(live.length){html+='<div class="sec-hdr"><span>🔴</span><span class="sec-name">Live</span></div>';live.forEach(m=>{html+=mcHTML(m,true);});}
      if(up.length){html+='<div class="sec-hdr"><span>⏰</span><span class="sec-name">Upcoming Today</span></div>';up.forEach(m=>{html+=mcHTML(m,false);});}
      if(done.length){html+='<div class="sec-hdr"><span>✅</span><span class="sec-name">Completed Today</span></div>';done.forEach(m=>{html+=mcHTML(m,false);});}
    }
  }
  else if(t==='schedule'){
    const up=MATCHES.filter(m=>m.hs===null&&!m.live).sort((a,b)=>a.date.localeCompare(b.date));
    const byD={};up.forEach(m=>{if(!byD[m.date])byD[m.date]=[];byD[m.date].push(m);});
    Object.entries(byD).forEach(([d,ms])=>{
      const dl=new Date(d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
      html+='<div class="sec-hdr"><span>📅</span><span class="sec-name">'+dl+'</span></div>';
      ms.forEach(m=>{html+=mcHTML(m,false);});
    });
  }
  else if(t==='results'){
    const done=MATCHES.filter(m=>m.st==='FT').sort((a,b)=>b.date.localeCompare(a.date));
    const byD={};done.forEach(m=>{if(!byD[m.date])byD[m.date]=[];byD[m.date].push(m);});
    Object.entries(byD).forEach(([d,ms])=>{
      const dl=new Date(d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
      html+='<div class="sec-hdr"><span>✅</span><span class="sec-name">'+dl+'</span></div>';
      ms.forEach(m=>{html+=mcHTML(m,false);});
    });
  }
  el.innerHTML=html;
}

function mcHTML(m,isLive){
  const hasScore=m.hs!==null;
  const hw=hasScore&&m.hs>m.as, aw=hasScore&&m.as>m.hs;
  const timeClass=isLive?'live':m.st==='FT'?'ft':'';
  const timeDisp=isLive?'<span style="color:var(--live)">●'+m.st+'</span>':m.st;
  return `<div class="mc" onclick="openMatch(${m.id})">
    <div class="mc-time ${timeClass}">${timeDisp}</div>
    <div class="mc-teams">
      <div class="mc-row">
        <span class="mc-flag">${m.hf}</span>
        <span class="mc-name" style="${hw?'font-weight:700':''}">${m.h}</span>
        <span class="mc-score ${hw?'w':'l'}">${hasScore?m.hs:''}</span>
      </div>
      <div class="mc-row">
        <span class="mc-flag">${m.af}</span>
        <span class="mc-name" style="${aw?'font-weight:700':''}">${m.a}</span>
        <span class="mc-score ${aw?'w':'l'}">${hasScore?m.as:''}</span>
      </div>
    </div>
    <div class="mc-meta">Group ${m.g}<br>${m.city}</div>
  </div>`;
}

function openMatch(id){
  const m=MATCHES.find(x=>x.id===id);if(!m)return;
  const hasScore=m.hs!==null;
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <div class="modal-hdr">
      <span style="font-size:12px;color:var(--t2)">Group ${m.g} · ${m.stad}</span>
      <button class="modal-close" onclick="this.closest('.modal-bg').remove()">✕ Close</button>
    </div>
    <div class="md-hdr">
      <div class="md-teams">
        <div class="md-team"><div class="md-flag">${m.hf}</div><div class="md-tname">${m.h}</div></div>
        <div style="text-align:center">
          <div class="md-score">${hasScore?m.hs+'–'+m.as:'vs'}</div>
          <div class="md-status">${m.live?'● '+m.st:m.st}</div>
          <div style="font-size:10.5px;color:var(--t3);margin-top:3px">${m.date} · ${m.time} ET</div>
        </div>
        <div class="md-team"><div class="md-flag">${m.af}</div><div class="md-tname">${m.a}</div></div>
      </div>
    </div>
    <div style="padding:12px 14px">
      <div style="font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Match Events</div>
      ${(m.ev||[]).map(e=>`<div class="ev-item"><span class="ev-min">${e.m}'</span><span class="ev-ico">${e.i}</span><span class="ev-txt">${e.t}</span></div>`).join('')||'<div style="color:var(--t3);font-size:12px">No events yet</div>'}
    </div>
    <div class="info-grid">
      <div class="ig"><div class="ig-lbl">Stadium</div><div class="ig-val">${m.stad}</div></div>
      <div class="ig"><div class="ig-lbl">City</div><div class="ig-val">${m.city}</div></div>
      <div class="ig"><div class="ig-lbl">Date</div><div class="ig-val">${m.date}</div></div>
      <div class="ig"><div class="ig-lbl">Kick-off</div><div class="ig-val">${m.time} ET</div></div>
    </div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
}

  const t=TEAMS.find(x=>x.n===name);if(!t)return;
  const st=Object.values(STANDINGS).flat().find(s=>s.t===name);
  const tms=MATCHES.filter(m=>m.h===name||m.a===name);
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <div class="modal-hdr">
      <span style="font-size:16px;font-weight:700">${t.f} ${t.n}</span>
      <button class="modal-close" onclick="this.closest('.modal-bg').remove()">✕ Close</button>
    </div>
    <div class="info-grid">
      <div class="ig"><div class="ig-lbl">Group</div><div class="ig-val">Group ${t.g}</div></div>
      <div class="ig"><div class="ig-lbl">Confederation</div><div class="ig-val"><span class="cbadge ${t.c}">${t.c}</span></div></div>
      <div class="ig"><div class="ig-lbl">FIFA Rating</div><div class="ig-val" style="color:var(--blue2)">${t.r}</div></div>
      ${t.host?`<div class="ig"><div class="ig-lbl">Status</div><div class="ig-val" style="color:var(--gold)">🏟️ Host Nation</div></div>`:''}
      ${st?`<div class="ig"><div class="ig-lbl">Played</div><div class="ig-val">${st.mp}</div></div>
            <div class="ig"><div class="ig-lbl">Points</div><div class="ig-val">${st.pts}</div></div>
            <div class="ig"><div class="ig-lbl">Goals For</div><div class="ig-val">${st.gf}</div></div>
            <div class="ig"><div class="ig-lbl">Goals Against</div><div class="ig-val">${st.ga}</div></div>`:''}
    </div>
    <div style="padding:12px 14px">
      <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Matches</div>
      ${tms.map(m=>mcHTML(m,m.live)).join('')||'<div style="color:var(--t3);font-size:12px">No matches yet</div>'}
    </div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
}

/* ────────────────────────────────────────────────────────
   TASK 6 — PLAYERS PAGE
   ──────────────────────────────────────────────────────── */
let activePTab='best';

function playerTab(t,btn){
  activePTab=t;
  document.querySelectorAll('#pg-players .tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderPlayers();
}

function renderPlayers(){
  const el=document.getElementById('players-body');
  let list;
  const posLabel=p=>GK.includes(p)?'GK':DEF.includes(p)?'DEF':MID.includes(p)?'MID':'ATT';
  if(activePTab==='best') list=[...GK,...DEF,...MID,...ATT].sort((a,b)=>b.r-a.r).slice(0,20);
  else if(activePTab==='gk') list=[...GK].sort((a,b)=>b.r-a.r);
  else if(activePTab==='def') list=[...DEF].sort((a,b)=>b.r-a.r);
  else if(activePTab==='mid') list=[...MID].sort((a,b)=>b.r-a.r);
  else list=[...ATT].sort((a,b)=>b.r-a.r);

  const medals=['🥇','🥈','🥉'];
  let html='';
  list.forEach((p,i)=>{
    const rc=p.r>=9?'r9':p.r>=8.5?'r85':p.r>=8?'r8':'r7';
    html+=`<div class="prow">
      <div class="p-rank ${i<3?'top':''}">${i<3?medals[i]:i+1}</div>
      <div class="p-avatar">${p.f}</div>
      <div class="p-info">
        <div class="p-name">${p.n}</div>
        <div class="p-detail">${p.f} ${p.country} · ${p.club} · <span style="color:var(--blue2)">${posLabel(p)}</span></div>
      </div>
      <div style="text-align:right;margin-right:8px;font-size:10.5px;color:var(--t3)">
        ⚽${p.goals} · 🎯${p.assists}${p.saves?` · 🛡${p.saves}`:''}
      </div>
      <div class="rating ${rc}">${p.r}</div>
    </div>`;
  });
  el.innerHTML=html;
}

/* ────────────────────────────────────────────────────────
   TASK 7 — TOP STATS PAGE
   ──────────────────────────────────────────────────────── */
let activeSTab='goals';

function statsTab(t,btn){
  activeSTab=t;
  document.querySelectorAll('#pg-stats .tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderStats();
}

function renderStats(){
  const el=document.getElementById('stats-body');
  const all=[...GK,...DEF,...MID,...ATT];
  let list,key,icon,label;

  if(activeSTab==='goals'){list=[...all].sort((a,b)=>b.goals-a.goals);key='goals';icon='⚽';label='Goals';}
  else if(activeSTab==='assists'){list=[...all].sort((a,b)=>b.assists-a.assists);key='assists';icon='🎯';label='Assists';}
  else if(activeSTab==='saves'){list=[...GK].sort((a,b)=>b.saves-a.saves);key='saves';icon='🛡️';label='Saves';}
  else if(activeSTab==='yellow'){
    const yCards=[
      {n:'Pedro Porro',f:'🇵🇹',country:'Portugal',club:'Sporting CP',v:3},
      {n:'Gjimsiti',f:'🇦🇱',country:'Albania',club:'Atalanta',v:2},
      {n:'João Lourenço',f:'🇦🇴',country:'Angola',club:'Paços de Ferreira',v:2},
      {n:'Thomas Müller',f:'🇩🇪',country:'Germany',club:'Bayern Munich',v:1},
      {n:'Pedri',f:'🇪🇸',country:'Spain',club:'Barcelona',v:1},
      {n:'Marquinhos',f:'🇧🇷',country:'Brazil',club:'PSG',v:1},
      {n:'Vertonghen',f:'🇧🇪',country:'Belgium',club:'Anderlecht',v:1},
    ];
    const max=yCards[0].v;
    let html='<div style="padding:9px 14px 5px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px">Yellow Cards</div>';
    yCards.forEach((p,i)=>{
      html+=`<div class="srow"><div class="srow-top">
        <div class="p-rank ${i<3?'top':''}" style="width:22px;text-align:center">${['🥇','🥈','🥉'][i]||i+1}</div>
        <div class="p-avatar">${p.f}</div>
        <div class="p-info"><div class="p-name">${p.n}</div><div class="p-detail">${p.f} ${p.country}</div></div>
        <div><div class="sval" style="color:var(--yellow)">🟨${p.v}</div></div>
      </div><div class="sbar"><div class="sbar-fill" style="width:${Math.round(p.v/max*100)}%;background:var(--yellow)"></div></div></div>`;
    });
    el.innerHTML=html;return;
  } else {
    const rCards=[
      {n:'Gjimsiti',f:'🇦🇱',country:'Albania',club:'Atalanta',v:1},
      {n:'Al-Dawsari',f:'🇸🇦',country:'Saudi Arabia',club:'Al-Hilal',v:1},
    ];
    let html='<div style="padding:9px 14px 5px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px">Red Cards</div>';
    rCards.forEach((p,i)=>{
      html+=`<div class="srow"><div class="srow-top">
        <div class="p-rank top" style="width:22px;text-align:center">🟥</div>
        <div class="p-avatar">${p.f}</div>
        <div class="p-info"><div class="p-name">${p.n}</div><div class="p-detail">${p.f} ${p.country}</div></div>
        <div><div class="sval" style="color:var(--red)">🟥${p.v}</div></div>
      </div><div class="sbar"><div class="sbar-fill" style="width:100%;background:var(--red)"></div></div></div>`;
    });
    el.innerHTML=html;return;
  }

  const max=list[0]?list[0][key]:1;
  const medals=['🥇','🥈','🥉'];
  let html=`<div style="padding:9px 14px 5px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px">${icon} ${label} Leaders</div>`;
  list.slice(0,15).forEach((p,i)=>{
    const pct=max>0?Math.round(p[key]/max*100):0;
    html+=`<div class="srow"><div class="srow-top">
      <div class="p-rank ${i<3?'top':''}" style="width:22px;text-align:center">${i<3?medals[i]:i+1}</div>
      <div class="p-avatar">${p.f}</div>
      <div class="p-info"><div class="p-name">${p.n}</div><div class="p-detail">${p.f} ${p.country} · ${p.club}</div></div>
      <div><div class="sval">${icon}${p[key]}</div><div class="sval-lbl">${label}</div></div>
    </div><div class="sbar"><div class="sbar-fill" style="width:${pct}%"></div></div></div>`;
  });
  el.innerHTML=html;
}

/* ────────────────────────────────────────────────────────
   TASK 8 — STADIUMS PAGE
   ──────────────────────────────────────────────────────── */
function renderStadiums(){
  const el=document.getElementById('stadiums-body');
  let html='<div style="padding:8px 14px 4px;font-size:11.5px;color:var(--t3)">16 venues across USA 🇺🇸, Mexico 🇲🇽 &amp; Canada 🇨🇦</div>';
  html+='<div class="stad-grid">';
  STADIUMS.forEach(s=>{
    html+=`<div class="stad-card" onclick="openStadium('${s.n.replace(/'/g,"\\'")}')">
      <div class="stad-img">🏟️</div>
      <div class="stad-body">
        <div class="stad-name">${s.n}${s.final?'<span style="margin-left:6px;font-size:9px;background:var(--gold);color:#000;border-radius:3px;padding:1px 5px;font-weight:700">FINAL</span>':''}</div>
        <div class="stad-city">${s.f} ${s.city}, ${s.country}</div>
        <div class="stad-stats">
          <div class="ss"><strong>${s.cap}</strong>Capacity</div>
          <div class="ss"><strong>${s.wc}</strong>Matches</div>
          <div class="ss"><strong>${s.yr}</strong>Opened</div>
        </div>
      </div>
    </div>`;
  });
  html+='</div>';

}

function openStadium(name){
  const s=STADIUMS.find(x=>x.n===name);if(!s)return;
  const games=MATCHES.filter(m=>m.stad===name||m.stad===name.replace('Lincoln Financial','Lincoln Financial Field'));
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <div class="modal-hdr">
      <span style="font-size:14px;font-weight:700">🏟️ ${s.n}</span>
      <button class="modal-close" onclick="this.closest('.modal-bg').remove()">✕ Close</button>
    </div>
    <div style="height:140px;background:linear-gradient(135deg,#0a1628,#1a2744);display:flex;align-items:center;justify-content:center;font-size:64px">🏟️</div>
    ${s.final?`<div style="background:linear-gradient(135deg,#4d3800,#3d2800);padding:10px;text-align:center;font-size:12.5px;font-weight:700;color:var(--gold)">🏆 FIFA World Cup 2026 Final Venue</div>`:''}
    <div class="info-grid">
      <div class="ig"><div class="ig-lbl">City</div><div class="ig-val">${s.city}</div></div>
      <div class="ig"><div class="ig-lbl">Country</div><div class="ig-val">${s.f} ${s.country}</div></div>
      <div class="ig"><div class="ig-lbl">Capacity</div><div class="ig-val">${s.cap}</div></div>
      <div class="ig"><div class="ig-lbl">Surface</div><div class="ig-val">${s.surf}</div></div>
      <div class="ig"><div class="ig-lbl">Year Built</div><div class="ig-val">${s.yr}</div></div>
      <div class="ig"><div class="ig-lbl">WC Matches</div><div class="ig-val">${s.wc}</div></div>
    </div>
    ${games.length?`<div style="padding:12px 14px"><div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Matches at this venue</div>${games.map(m=>mcHTML(m,m.live)).join('')}</div>`:''}
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
}

/* ────────────────────────────────────────────────────────
   TASK 9 — REFEREES PAGE
   ──────────────────────────────────────────────────────── */
function renderReferees(){
  const el=document.getElementById('referees-body');
  let html='<div style="padding:8px 14px 4px;font-size:11.5px;color:var(--t3);border-bottom:1px solid var(--border)">FIFA-assigned match officials for World Cup 2026</div>';
  REFS.forEach(r=>{
    html+=`<div class="ref-row">
      <div class="ref-ava">${r.f}</div>
      <div class="ref-info">
        <div class="ref-name">${r.n}</div>
        <div class="ref-detail">${r.f} ${r.country} · Age ${r.age}</div>
        ${r.fin.length?`<div class="ref-finals">⭐ ${r.fin.join(' · ')}</div>`:''}
      </div>
      <div class="ref-nums">
        <div class="rn"><div class="rn-num">${r.mat}</div><div class="rn-lbl">Games</div></div>
        <div class="rn"><div class="rn-num" style="color:var(--yellow)">${r.yel}</div><div class="rn-lbl">🟨</div></div>
        <div class="rn"><div class="rn-num" style="color:var(--red)">${r.red}</div><div class="rn-lbl">🟥</div></div>
        <div class="rn"><div class="rn-num" style="color:var(--blue2)">${r.rat}</div><div class="rn-lbl">Rating</div></div>
      </div>

/* ────────────────────────────────────────────────────────
   TASK 10 — NAV, SEARCH, LIVE TICK, SCROLL TOP
   ──────────────────────────────────────────────────────── */
let currentPage='matches';

function nav(pg, topBtn, mobBtn){
  currentPage=pg;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+pg).classList.add('on');
  document.querySelectorAll('.tnb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.mbn').forEach(b=>b.classList.remove('on'));
  if(topBtn)topBtn.classList.add('on');
  if(mobBtn)mobBtn.classList.add('on');
  // sync top nav when called from mobile
  if(!topBtn){
    document.querySelectorAll('.tnb').forEach(b=>{if(b.dataset.pg===pg)b.classList.add('on');});
  }
  if(!mobBtn){
    document.querySelectorAll('.mbn').forEach(b=>{if(b.dataset.pg===pg)b.classList.add('on');});
  }
  // render on first visit
  switch(pg){
    case 'matches':   renderMatches();break;
    case 'standings': renderStandings();break;
    case 'teams':     renderTeams();break;
    case 'players':   renderPlayers();break;
    case 'stats':     renderStats();break;
    case 'stadiums':  renderStadiums();break;
    case 'referees':  renderReferees();break;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function doSearch(q){
  if(q.length<2)return;
  const ql=q.toLowerCase();
  const team=TEAMS.find(t=>t.n.toLowerCase().includes(ql));
  if(team){
    nav('teams',null,null);
    setTimeout(()=>openTeam(team.n),120);
    return;
  }
  const all=[...GK,...DEF,...MID,...ATT];
  if(all.find(p=>p.n.toLowerCase().includes(ql))){
    nav('players',null,null);
  }
}

function updateSummaryStats(){
  const done=MATCHES.filter(m=>m.hs!==null);
  let goals=0; done.forEach(m=>{goals+=m.hs+m.as;});
  const live=MATCHES.filter(m=>m.live);
  document.getElementById('s-goals').textContent=goals;
  document.getElementById('s-played').textContent=done.length;
  document.getElementById('s-live').textContent=live.length;
  const ld=document.getElementById('liveDot');
  ld.textContent=live.length?'● '+live.length+' LIVE':'● LIVE';
}

// live minute tick every 30s
setInterval(()=>{
  MATCHES.filter(m=>m.live).forEach(m=>{
    const match=m.st.match(/(\d+)/);
    if(match){
      const min=parseInt(match[1]);
      if(min<90)m.st=(min+1)+"'";
    }
  });
  if(currentPage==='matches'&&activeMatchTab==='live')renderMatches();
  updateSummaryStats();
},30000);

window.addEventListener('scroll',()=>{
  document.getElementById('scrollTop').classList.toggle('show',window.scrollY>350);
});

// ── INIT ────────────────────────────────────────────────
renderMatches();
updateSummaryStats();
renderTeams();
renderPlayers();
renderStats();
renderStadiums();
renderReferees();
renderStandings();
</script>
</body>
</html>
